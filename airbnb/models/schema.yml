models:
  - name: dim_listings_cleansed
    description: Cleansed dimension table for Airbnb listings
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
          severity: error

    columns:
     - name: listing_id
       description: Unique identifier for each listing
       data_tests:
         - unique
         - not_null

     - name: host_id
       description: Unique identifier for each host
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleansed')
               field: host_id

     - name: room_type
       description: Type of room offered in the listing
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']

     - name: minimum_nights 
       description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
       data_tests:
         - positive_values

  - name: dim_hosts_cleansed
    config:
      contract:
        enforced: true

    columns:
    
     - name: host_id
       data_type: integer
       data_tests:
         - unique
         - not_null

     - name: host_name
       data_type: string
       data_tests:
         - not_null

     - name: is_superhost
       data_type: string
       data_tests:
         - accepted_values:
            arguments:
              values: ['t', 'f']

     - name: updated_at
       data_type: timestamp

     - name: created_at
       data_type: timestamp